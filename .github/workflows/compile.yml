name: Compilar IPA para KSign
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Dependencias
        run: |
          # Intentamos instalar dependencias de Node
          npm install --force
          # Si existe carpeta de Pods, la preparamos
          if [ -d "Pods" ]; then echo "Pods ya presentes"; else if [ -f "Podfile" ]; then pod install; fi; fi

      - name: Compilar App (Sin Firmar)
        run: |
          # Usamos el nombre que sale en tu captura: Code.xcodeproj
          xcodebuild archive \
            -project Code.xcodeproj \
            -scheme Code \
            -archivePath CodeApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Crear IPA para KSign
        run: |
          mkdir -p Payload
          cp -R CodeApp.xcarchive/Products/Applications/*.app Payload/
          zip -r CodeApp_para_KSign.ipa Payload
          mkdir output
          mv CodeApp_para_KSign.ipa output/

      - name: Descargar mi IPA
        uses: actions/upload-artifact@v4
        with:
          name: App-Lista-Para-KSign
          path: output/*.ipa
