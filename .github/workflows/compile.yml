name: Compilar IPA para KSign
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Compilar App (Sin Firmar)
        run: |
          # Solo compilamos, sin buscar archivos de Node que no existen
          xcodebuild archive \
            -project Code.xcodeproj \
            -scheme Code \
            -archivePath CodeApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Crear IPA para KSign
        run: |
          mkdir -p Payload
          # Buscamos la app compilada y la metemos en el Payload
          cp -R CodeApp.xcarchive/Products/Applications/*.app Payload/
          zip -r CodeApp_para_KSign.ipa Payload
          mkdir output
          mv CodeApp_para_KSign.ipa output/

      - name: Descargar mi IPA
        uses: actions/upload-artifact@v4
        with:
          name: App-Lista-Para-KSign
          path: output/*.ipa
